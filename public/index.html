<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8">
  <title>IP Worker 说明页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noimageindex">

  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/libs/scsr/dist/scsr.min.js"></script>

  <script src="./js/public.js"></script>
  <link rel="stylesheet" href="./css/public.css" />
</head>

<body>
  <o-app src="./app-config.mjs">
    <template page>

      <link rel="stylesheet" href="./css/public.css" />

      <header>
        <h1>IP Worker 接口说明</h1>
        <p>
          本服务用于获取 <b>IP 地址</b> 及相关网络与地理信息，
          支持访问者 IP 查询和指定 IP 查询，并提供多种返回格式。
        </p>
      </header>

      <main>

        <h2>接口地址</h2>
        <ul>
          <li><b>IPv4/IPv6：</b> <code :text="host46"></code></li>
          <li><b>仅 IPv4：</b> <code :text="host4"></code></li>
          <li><b>仅 IPv6：</b> <code :text="host6"></code></li>
          <li><b>WebRTC相关：</b> <a href="/webrtc" olink><code>/webrtc</code></a></li>
        </ul>

        <h2>用法示例</h2>

        <h4>访问者 IP 查询</h4>
        <small>format 默认值 text</small>
        <ul>
          <li class="demo-link">
            <a href="/api">
              <code>/api</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/text">
              <code>/api/text</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api?format=text">
              <code>/api?format=text</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/jsonp/callbackName">
              <code>/api/jsonp/callbackName</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api?format=jsonp&callback=callbackName">
              <code>/api?format=jsonp&callback=callbackName</code>
            </a>
          </li>
        </ul>

        <h4>指定 IP 查询</h4>
        <small>format 默认值 json</small>
        <ul>
          <li class="demo-link">
            <a href="/api/ip/8.8.8.8">
              <code>/api/ip/8.8.8.8</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/ip/8.8.8.8/json">
              <code>/api/ip/8.8.8.8/json</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/ip?ip=8.8.8.8&format=json">
              <code>/api/ip?ip=8.8.8.8&format=json</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/ip/8.8.8.8/jsonp/callbackName">
              <code>/api/ip/8.8.8.8/jsonp/callbackName</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/api/ip?ip=8.8.8.8&format=jsonp&callback=callbackName">
              <code>/api/ip?ip=8.8.8.8&format=jsonp&callback=callbackName</code>
            </a>
          </li>
        </ul>

        <h3>支持格式</h3>

        <ul>
          <li><code>json</code>：JSON 对象</li>
          <li><code>xml</code>：XML 文档</li>
          <li><code>jsonp</code>：JSONP，需要 <code>callback</code> 参数</li>
          <li><code>text</code>：仅返回 IP 字符串</li>
        </ul>

        <h2>返回字段</h2>

        <p>
          字段来源：
        </p>

        <ul>
          <li><b>访问者 IP：</b> 来自 Cloudflare Workers 的 <code>request.cf</code> 信息。</li>
          <li><b>指定 IP：</b> 来自第三方 IP 数据 API。</li>
        </ul>

        <pre :text="example"></pre>

        <h2>请求示例</h2>

        <l-m src="./component/ip-info.html"></l-m>
        <ip-info></ip-info>

      </main>

      <footer>

        <div>
          <l-m src="./component/shields-badge.html"></l-m>

          <shields-badge href="https://github.com/cyb233/ip-worker" path="github/stars/cyb233/ip-worker" query="maxAge=0" alt="GitHub Repo stars">
          </shields-badge>

        </div>

        Powered by
        <a href="https://workers.cloudflare.com/" target="_blank">
          Cloudflare Workers
        </a>

      </footer>

      <script>
        export default {
          data: {

            host46: 'ip.shuvi.moe',
            host4: 'ip4.shuvi.moe',
            host6: 'ip6.shuvi.moe',

            example: JSON.stringify({
              "ip": "IP地址",
              "asn": "自治系统编号",
              "colo": "Cloudflare节点（仅访问者IP存在）",
              "continent": "大洲",
              "country": "国家",
              "city": "城市",
              "isEUCountry": "是否欧盟国家",
              "asOrganization": "运营商/ASN组织",
              "longitude": "经度",
              "latitude": "纬度",
              "postalCode": "邮编",
              "region": "地区",
              "regionCode": "地区代码",
              "timezone": "时区",
              "userAgent": "用户代理",
              "raw": "原始数据(JSON)"
            }, null, 2),

          }
        }
      </script>

    </template>
  </o-app>
</body>

</html>
