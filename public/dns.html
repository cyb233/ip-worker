<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8">
  <title>DNS over HTTPS 说明页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noimageindex">

  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/libs/scsr/dist/scsr.min.js"></script>

  <script src="./js/public.js"></script>
  <link rel="stylesheet" href="./css/public.css" />
</head>

<body>
  <o-app src="./app-config.mjs">
    <template page>

      <link rel="stylesheet" href="./css/public.css" />
      <a href="/" olink>返回</a>

      <header>
        <h1>DNS over HTTPS 说明</h1>
        <p>
          本页说明当前 Worker 提供的 DNS 解析能力：<code>/dns-query</code> 提供标准 DoH 接口，
          <code>/resolve</code> 提供更便于脚本和调试使用的 JSON 解析结果。
        </p>
      </header>

      <main>

        <h2>接口地址</h2>
        <ul>
          <li><b>标准 DoH：</b> <code>/dns-query</code></li>
          <li><b>JSON 解析：</b> <code>/resolve</code></li>
        </ul>

        <h2>DNS_API_KEY 可选鉴权</h2>
        <p>
          默认情况下，DNS 接口是公开的；当配置了 <code>DNS_API_KEY</code> 后，访问路径需要增加一个 key 前缀。
        </p>
        <pre>
/&lt;DNS_API_KEY&gt;/dns-query
/&lt;DNS_API_KEY&gt;/resolve
        </pre>
        <p>
          例如：
        </p>
        <ul>
          <li><code>/test-key/dns-query?dns=AAABAAABAAAAAAAAA2RucwdleGFtcGxlA2NvbQAAAQAB</code></li>
          <li><code>/test-key/resolve?name=example.com&type=A</code></li>
        </ul>
        <p>
          注意：路径中的 key 可能会出现在日志、浏览器历史或代理记录中，请使用高强度且 URL-safe 的随机值，并优先通过 Cloudflare secret 配置。
        </p>

        <h2>标准 DoH</h2>
        <p>
          <code>/dns-query</code> 实现标准 DNS over HTTPS 接口，支持 RFC 8484 风格的 GET 与 POST。
        </p>

        <h4>GET</h4>
        <small>使用 <code>dns</code> 参数传入 base64url 编码后的 DNS wire message</small>
        <ul>
          <li class="demo-link">
            <a href="/dns-query?dns=AAABAAABAAAAAAAAA2RucwdleGFtcGxlA2NvbQAAAQAB">
              <code>/dns-query?dns=AAABAAABAAAAAAAAA2RucwdleGFtcGxlA2NvbQAAAQAB</code>
            </a>
          </li>
          <li>
            <code>/&lt;DNS_API_KEY&gt;/dns-query?dns=AAABAAABAAAAAAAAA2RucwdleGFtcGxlA2NvbQAAAQAB</code>
          </li>
        </ul>

        <h4>POST</h4>
        <small>请求与响应的 <code>Content-Type</code> 均为 <code>application/dns-message</code></small>
        <pre>
POST /dns-query
POST /&lt;DNS_API_KEY&gt;/dns-query
Content-Type: application/dns-message
Accept: application/dns-message

&lt;raw dns wire message&gt;
        </pre>

        <h2>JSON 解析</h2>
        <p>
          <code>/resolve</code> 用于直接获取可读 JSON 结果，默认查询类型为 <code>A</code>，支持
          <code>type</code>、<code>cd</code>、<code>do</code> 参数。
        </p>

        <ul>
          <li class="demo-link">
            <a href="/resolve?name=example.com&type=A">
              <code>/resolve?name=example.com&type=A</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/resolve?name=cloudflare.com&type=AAAA">
              <code>/resolve?name=cloudflare.com&type=AAAA</code>
            </a>
          </li>
          <li class="demo-link">
            <a href="/resolve?name=example.com&type=MX&do=1">
              <code>/resolve?name=example.com&type=MX&do=1</code>
            </a>
          </li>
          <li>
            <code>/&lt;DNS_API_KEY&gt;/resolve?name=example.com&type=A</code>
          </li>
        </ul>

        <pre :text="dnsExample"></pre>

      </main>

      <footer>
        <div>
          <l-m src="./component/shields-badge.html"></l-m>

          <shields-badge href="https://github.com/cyb233/ip-worker" path="github/stars/cyb233/ip-worker" query="maxAge=0" alt="GitHub Repo stars">
          </shields-badge>
        </div>

        Powered by
        <a href="https://workers.cloudflare.com/" target="_blank">
          Cloudflare Workers
        </a>
      </footer>

      <script>
        export default {
          data: {
            dnsExample: JSON.stringify({
              "Status": 0,
              "TC": false,
              "RD": true,
              "RA": true,
              "AD": false,
              "CD": false,
              "Question": [
                { "name": "example.com.", "type": 1 }
              ],
              "Answer": [
                { "name": "example.com.", "type": 1, "TTL": 300, "data": "93.184.216.34" }
              ],
              "Authority": [],
              "Additional": []
            }, null, 2),
          }
        }
      </script>

    </template>
  </o-app>
</body>

</html>
